<template>
    <lightning-card title={cardTitle} icon-name="utility:einstein">
        <div class="slds-var-p-horizontal_medium slds-var-p-bottom_medium">
            <lightning-textarea
                name="question"
                label="Ask about this client"
                placeholder="e.g. What products has this client purchased and what is their support history?"
                value={question}
                onchange={handleQuestionChange}>
            </lightning-textarea>

            <div class="slds-var-m-top_small slds-grid slds-grid_vertical-align-center slds-wrap">
                <lightning-button
                    variant="brand"
                    label="Ask"
                    onclick={handleAsk}
                    disabled={isLoading}
                    class="slds-var-m-right_x-small">
                </lightning-button>
                <template for:each={cannedPrompts} for:item="p">
                    <lightning-button
                        key={p}
                        variant="neutral"
                        label={p}
                        data-prompt={p}
                        onclick={handleCannedPrompt}
                        class="slds-var-m-right_x-small slds-var-m-top_xx-small">
                    </lightning-button>
                </template>
            </div>

            <template lwc:if={isLoading}>
                <div class="slds-var-m-top_medium slds-align_absolute-center">
                    <lightning-spinner alternative-text="Generating" size="small"></lightning-spinner>
                </div>
            </template>

            <template lwc:if={hasError}>
                <div class="slds-var-m-top_medium slds-text-color_error">{errorMessage}</div>
            </template>

            <template lwc:if={hasAnswer}>
                <div class="slds-box slds-var-m-top_medium answer-box">
                    <p class="slds-text-body_regular answer-text">{answer}</p>
                    <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_small">
                        {modelBadge} - AI-generated content may be inaccurate. Verify before sharing with clients.
                    </p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
