name: Auto PR

# Step 3 of the demo flow: pushing a feature/* branch automatically opens a PR
# into main. The quality gate (pr-validate) runs on the push; once it's green,
# branch protection lets you click "Merge" in the GitHub UI, and that human
# merge triggers deploy.yml (a token-driven auto-merge would not).

on:
  push:
    branches:
      - "feature/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open PR (if none) and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already exists for $BRANCH"
          else
            gh pr create --base main --head "$BRANCH" \
              --title "$BRANCH" \
              --body "Automated PR opened for \`$BRANCH\`. The quality gate runs on push; once it is green, click Merge to deploy to the sandbox."
          fi
