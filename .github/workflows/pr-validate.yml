name: PR Validate

# Step 4 of the demo flow: when a PR is opened/updated against main, spin up a
# fresh, throwaway scratch org, run the basic quality checks (static analysis +
# Apex tests) against it, then delete it. This is the required status check that
# gates the merge (see branch protection in .github/CICD-SETUP.md). On green,
# auto-merge takes over.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Scratch-org quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Decode JWT server key
        run: echo "${{ secrets.SF_JWT_KEY }}" | base64 --decode > server.key

      - name: Authenticate to Dev Hub (JWT)
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_DEVHUB_CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_DEVHUB_USERNAME }}" \
            --instance-url "https://login.salesforce.com" \
            --alias devhub --set-default-dev-hub

      - name: Create ephemeral scratch org
        run: |
          sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --alias ci-scratch --duration-days 1 \
            --target-dev-hub devhub --set-default

      - name: Static analysis (Salesforce Code Analyzer)
        run: |
          sf plugins install code-analyzer
          sf code-analyzer run \
            --workspace "demo-app" \
            --rule-selector Recommended \
            --severity-threshold 2 \
            --output-file code-analyzer-results.json

      - name: Deploy source to scratch org
        run: sf project deploy start --source-dir demo-app

      - name: Assign permission set + run Apex tests
        run: |
          sf org assign permset --name Bedrock_Deployment_Demo
          sf apex run test \
            --class-names DeploymentDemoServiceTest \
            --code-coverage --result-format human --wait 20

      - name: Delete scratch org
        if: always()
        run: sf org delete scratch --target-org ci-scratch --no-prompt || true

      - name: Remove key
        if: always()
        run: rm -f server.key
