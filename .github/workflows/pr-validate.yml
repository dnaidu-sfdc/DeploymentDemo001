name: PR Validate

# Step 4 of the demo flow: when a feature/* branch is pushed, run the basic
# quality checks against the AFCAPQA1 sandbox:
#   1. Salesforce Code Analyzer (static analysis)
#   2. a CHECK-ONLY (validate) deploy that runs the Apex tests but does NOT
#      write anything to the org (--dry-run)
# Runs on the push event so it fires reliably even when auto-pr opens the PR via
# the Actions token. The resulting "Scratch-org quality gate" check attaches to
# the head commit, satisfies branch protection, and auto-merge takes over on green.

on:
  push:
    branches:
      - "feature/**"

concurrency:
  group: pr-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Scratch-org quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Decode JWT server key
        run: echo "${{ secrets.SF_JWT_KEY }}" | base64 --decode > server.key

      - name: Authenticate to AFCAPQA1 sandbox (JWT)
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_SANDBOX_CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_SANDBOX_USERNAME }}" \
            --instance-url "https://test.salesforce.com" \
            --alias sandbox --set-default

      - name: Static analysis (Salesforce Code Analyzer)
        run: |
          sf plugins install code-analyzer
          sf code-analyzer run \
            --workspace "demo-app" \
            --rule-selector Recommended \
            --severity-threshold 2 \
            --output-file code-analyzer-results.json

      - name: Validate deploy (check-only) + run Apex tests
        run: |
          sf project deploy start \
            --dry-run \
            --source-dir demo-app \
            --test-level RunSpecifiedTests \
            --tests DeploymentDemoServiceTest \
            --wait 30

      - name: Remove key
        if: always()
        run: rm -f server.key
