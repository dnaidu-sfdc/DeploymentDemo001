name: Deploy to Sandbox

# Step 6 of the demo flow: once the PR merges to main, deploy the source
# straight from the repo into the AFCAPQQA1 sandbox and run the Apex tests.
# This is the "automatically deployed to a Salesforce org from the repository"
# requirement.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-sandbox
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy demo-app to AFCAPQQA1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Decode JWT server key
        run: echo "${{ secrets.SF_JWT_KEY }}" | base64 --decode > server.key

      - name: Authenticate to AFCAPQQA1 sandbox (JWT)
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_SANDBOX_CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_SANDBOX_USERNAME }}" \
            --instance-url "https://test.salesforce.com" \
            --alias sandbox --set-default

      - name: Deploy source + run Apex tests
        run: |
          sf project deploy start \
            --source-dir demo-app \
            --test-level RunSpecifiedTests \
            --tests DeploymentDemoServiceTest \
            --wait 30

      - name: Remove key
        if: always()
        run: rm -f server.key
